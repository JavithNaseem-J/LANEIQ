stages:
  featurize:
    cmd: python ../src/features/transform.py
    deps:
      - ../data/raw/manifests.json
      - ../src/features/transform.py
    params:
      - params.yaml:
        - solver.cost_coefficients
    outs:
      - ../data/features/routing_inputs.json

  solve:
    cmd: python ../src/solver/solve_stage.py
    deps:
      - ../data/features/routing_inputs.json
      - ../src/solver/vrp.py
      - ../src/solver/baseline.py
      - ../models/solver_configs/best_config.json
    outs:
      - ../data/processed/routes.json

  evaluate:
    cmd: F:\DSML\LANEIQ\.venv\Scripts\python.exe ../src/tasks/eval_stage.py
    deps:
      - ../src/tasks/eval_stage.py
      - ../src/agents/graph.py
      - ../src/agents/planner.py
      - ../src/agents/route.py
      - ../src/agents/exception.py
      - ../src/agents/report.py
      - ../models/solver_configs/best_config.json
    outs:
      - ../data/processed/eval_results.json

  monitor:
    cmd: F:\DSML\LANEIQ\.venv\Scripts\python.exe ../src/monitoring/drift.py
    deps:
      - ../src/monitoring/drift.py
      - ../data/features/routing_inputs.json
      - ../data/processed/reference.json
    outs:
      - ../data/processed/drift_report.html

